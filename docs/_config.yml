title: Lightcodepedia
description: A GitHub Pages site
lc_canonical_host: lightcodepedia.org
lc_canonical_owner: michelzam   # the root repo owner; forks compare against this to flag themselves

# Render markdown pages that have NO front matter (GitHub Pages runs this by
# default; declaring it makes it explicit + works on any Jekyll build). This is
# what lets a page start straight at "# Heading" — no empty --- block needed.
plugins:
  - jekyll-optional-front-matter


defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "modules"   # only /modules
    values:
      layout: null      # don't wrap them in HTML
  # Section-wide guide — one declaration, no per-page config: every page
  # under micro_build_ai/ auto-docks Doc as its guide. The first 📌 Keep on
  # such a page writes the page's own avatar fence, which then owns the
  # guide and its accumulated Q&A.
  - scope:
      path: "micro_build_ai"
    values:
      guide: doc

# Important: tell Jekyll to copy .yaml as-is
include:
  - modules
  - modules/*.yaml

mermaid:
  # pick any version listed on jsDelivr
  version: "10.9.1"
