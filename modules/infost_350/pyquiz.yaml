module:
  - name: pyquiz
    doc: "Quiz covering Modules 1–10 — INFOST 350/350G"
    icon: "🐍"

imports:
  - !Module
    name: designers
    hidden: True
  - !Module
    name: blocks
    hidden: True
  - !Module
    name: inspectors
    hidden: True
  - !Module
    name: tutorials
    hidden: True

classes:

  - !Class
    name: PyRiddle
    bases: [ tutorials.Riddle ]
    doc: Python riddle
    attributes:
      - !Attribute
        name: question
        type: str
        read_only: True
        is_long: True
        height: 200

instances:

  - !PyRiddle &quiz01
    title: "M1: First Script 🧾"
    question: |
      What's the correct way to greet the user using their input?
    correct_answer: 'print(f"Hello {name}")'
    difficulty: 1
    as_name: quiz01
    options:
      - 'print("Hello name")'
      - 'print(f"Hello {name}")'
      - 'print("Hello", name)'
    hints: [ "See f-string usage, Module 1", "The variable needs to be embedded inside the string" ]

  - !PyRiddle &quiz02
    title: "M2: What happens first? 🔁"
    question: |
      What does Python execute first when this runs?

      temp = int(input("Temp? "))
      print(temp - 5)

    correct_answer: 'Reads user input'
    difficulty: 1
    as_name: quiz02
    options:
      - 'Prints the result'
      - 'Reads user input'
      - 'Subtracts 5'
    hints: [ "See data flow: input → compute → print (Module 2)" ]

  - !PyRiddle &quiz03
    title: "M3: Functions & Control 🧪"
    question: |
      Which line *defines* a function?
    correct_answer: "def cool_down(temp):"
    difficulty: 1
    as_name: quiz03
    options:
      - "cool_down(140)"
      - "def cool_down(temp):"
      - "return temp - 5"
    hints: [ "Definition vs. call", "Starts with def..." ]

  - !PyRiddle &quiz04
    title: "M4: Strings & Slicing 🔡"
    question: |
      What does this print?

      word = "Python"
      print(word[2:5])

    correct_answer: "tho"
    difficulty: 2
    as_name: quiz04
    options:
      - "yth"
      - "tho"
      - "hon"
    hints: [ "Start at index 2, stop before 5", "See slicing: Module 5" ]

  - !PyRiddle &quiz05
    title: "M5: Lists or Strings? 📦"
    question: |
      Which returns the number of times 2 appears in the list?
    correct_answer: "[1, 2, 2, 3].count(2)"
    difficulty: 1
    as_name: quiz05
    options:
      - "[1, 2, 2, 3].index(2)"
      - "[1, 2, 2, 3].count(2)"
      - "len([1, 2, 2, 3])"
    hints: [ "count vs. index vs. len", "Only one counts occurrences" ]

  - !PyRiddle &quiz06
    title: "M6: Objects & Methods 🐾"
    question: |
      Given:

      class Pet:
          def __init__(self, name):
              self.name = name

      p = Pet("Lucky")

      What does `p.name` return?

    correct_answer: "Lucky"
    difficulty: 2
    as_name: quiz06
    options:
      - "name"
      - "Lucky"
      - "None"
    hints: [ "Attribute access", "See object construction in Module 7" ]

  - !PyRiddle &quiz07
    title: "M7: Encapsulation 🎁"
    question: |
      Which line customizes how a class prints?
    correct_answer: "def __str__(self):"
    difficulty: 2
    as_name: quiz07
    options:
      - "def __init__(self):"
      - "def __str__(self):"
      - "def display(self):"
    hints: [ "Printing needs a special method", "See Module 8" ]

  - !PyRiddle &quiz08
    title: "M8: Tests & Proof 🧪"
    question: |
      What does `doctest.testmod(verbose=True)` do?
    correct_answer: "Runs embedded tests and prints output"
    difficulty: 2
    as_name: quiz08
    options:
      - "Prints all variables"
      - "Runs embedded tests and prints output"
      - "Shows all functions"
    hints: [ "See doctest examples in Module 9" ]


  - !PyRiddle &quiz09
    title: "M9: Clean Code 🛀"
    question: |
      What tool checks for type mismatches using hints?
    correct_answer: "mypy"
    difficulty: 2
    as_name: quiz09
    options:
      - "doctest"
      - "mypy"
      - "pep8"
    hints: [ "Which one checks types?", "See Module 10 — 'Dr. Mypy'" ]

  - !PyRiddle &riddleM10
    title: "M10: Type Hints 🎯"
    question: |
      What does this function return?

      def triple(x: int) -> int:
          return x * 3

      triple(2)

    correct_answer: "6"
    difficulty: 2
    as_name: riddleM10
    options:
      - "5"
      - "6"
      - "9"
    hints: [ "2 * 3", "The type hints help, but it works like usual math" ]

  - !PyRiddle &riddleM11
    title: "M11: Looping with Indexes 🔁"
    question: |
      What does this print?

      word = "race"
      for i in range(len(word)):
          print(word[i])

    correct_answer: "r\na\nc\ne"
    difficulty: 2
    as_name: riddleM11
    options:
      - "race"
      - "r\na\nc\ne"
      - "0123"
    hints: [ "Loop over index range", "Access by index" ]

  - !PyRiddle &riddleM12
    title: "M12: String Replace 🔄"
    question: |
      What does this output?

      msg = "hi"
      print(msg.replace("h", "b"))

    correct_answer: "bi"
    difficulty: 1
    as_name: riddleM12
    options:
      - "hi"
      - "bi"
      - "hb"
    hints: [ "See string methods", "replace changes one char to another" ]

  - !PyRiddle &riddleM13
    title: "M13: Method Call Syntax ☎"
    question: |
      What is the correct way to call a method on a string?

    correct_answer: "'Hello'.lower()"
    difficulty: 1
    as_name: riddleM13
    options:
      - "lower('Hello')"
      - "'Hello'.lower()"
      - "lower = Hello()"
    hints: [ "Dot notation method call" ]

  - !PyRiddle &riddleM14
    title: "M14: File Write ✍"
    question: |
      What does this do?

      with open("out.txt", "w") as f:
          f.write("hi")

    correct_answer: "Writes 'hi' into a file named out.txt"
    difficulty: 2
    as_name: riddleM14
    options:
      - "Reads a file"
      - "Deletes a file"
      - "Writes 'hi' into a file named out.txt"
    hints: [ "Mode 'w' is for writing", "with handles closing" ]

  - !PyRiddle &riddleM15
    title: "M15: File Read 📂"
    question: |
      What does this do?

      with open("data.txt", "r") as f:
          print(f.read())

    correct_answer: "Reads and prints the content of data.txt"
    difficulty: 2
    as_name: riddleM15
    options:
      - "Writes to data.txt"
      - "Reads and prints the content of data.txt"
      - "Closes the file"
    hints: [ "Mode 'r' is for reading" ]

  - !PyRiddle &riddleM16
    title: "M16: Append Mode ➕"
    question: |
      What happens when you write with mode "a"?

    correct_answer: "Appends to the file"
    difficulty: 1
    as_name: riddleM16
    options:
      - "Deletes file"
      - "Overwrites file"
      - "Appends to the file"
    hints: [ "'a' means append" ]

  - !PyRiddle &riddleM17
    title: "M17: Encrypt Step 1 🔐"
    question: |
      If you shift each letter by 1, what does 'abc' become?

    correct_answer: "bcd"
    difficulty: 2
    as_name: riddleM17
    options:
      - "abc"
      - "bcd"
      - "def"
    hints: [ "Shift using ord() and chr()", "Wrap around logic is optional" ]

  - !PyRiddle &riddleM18
    title: "M18: Function Default 🛠"
    question: |
      What does this do?

      def greet(name="Doc"):
          print("Hi", name)

      greet()

    correct_answer: "Prints 'Hi Doc'"
    difficulty: 1
    as_name: riddleM18
    options:
      - "Prints 'Hi name'"
      - "Prints 'Hi Doc'"
      - "Error"
    hints: [ "Default argument used" ]

  - !PyRiddle &riddleM19
    title: "M19: Type Hint ➡"
    question: |
      What does the ': str' mean here?

      def shout(word: str) -> str:
          return word.upper()

    correct_answer: "word is expected to be a string"
    difficulty: 2
    as_name: riddleM19
    options:
      - "Declare a string"
      - "word is expected to be a string"
      - "This is the return value"
    hints: [ "Hint to the reader and tools like mypy" ]

  - !PyRiddle &riddleM20
    title: "M20: mypy ✅"
    question: |
      What does mypy help you detect?

    correct_answer: "Type mismatches"
    difficulty: 2
    as_name: riddleM20
    options:
      - "Syntax errors"
      - "Missing semicolons"
      - "Type mismatches"
    hints: [ "Static type checking tool" ]

  - !PyRiddle &riddleM21
    title: "M21: Reading Input Again 🔁"
    question: |
      What type is returned by input()?
    correct_answer: "str"
    difficulty: 1
    as_name: riddleM21
    options:
      - "int"
      - "str"
      - "float"
    hints: [ "Always a string", "Use int() or float() to convert" ]

  - !PyRiddle &riddleM22
    title: "M22: Writing Clean Code 🧼"
    question: |
      What’s the purpose of PEP-8?
    correct_answer: "Style guide for Python code"
    difficulty: 1
    as_name: riddleM22
    options:
      - "File encryption method"
      - "Function testing framework"
      - "Style guide for Python code"
    hints: [ "Formatting, naming, spacing", "Introduced early" ]

  - !PyRiddle &riddleM23
    title: "M23: Using continue 🔄"
    question: |
      What does `continue` do in a loop?
    correct_answer: "Skips the rest of the loop and moves to the next iteration"
    difficulty: 2
    as_name: riddleM23
    options:
      - "Stops the program"
      - "Skips the rest of the loop and moves to the next iteration"
      - "Repeats the loop from the top"
    hints: [ "Doesn’t exit, just skips" ]

  - !PyRiddle &riddleM24
    title: "M24: String Building 🧱"
    question: |
      What does this print?

      name = \"Zam\"
      print(\"Hi \" + name)
    correct_answer: "Hi Zam"
    difficulty: 1
    as_name: riddleM24
    options:
      - "Hi name"
      - "Zam Hi"
      - "Hi Zam"
    hints: [ "String concatenation with +", "Exact spaces matter" ]

  - !PyRiddle &riddleM25
    title: "M25: Counting Characters 🔢"
    question: |
      What does len("python") return?
    correct_answer: "6"
    difficulty: 1
    as_name: riddleM25
    options:
      - "5"
      - "6"
      - "7"
    hints: [ "Count the letters", "See Module 5" ]

  - !PyRiddle &riddleM26
    title: "M26: Breaking Loops 🔓"
    question: |
      What does `break` do inside a loop?
    correct_answer: "Exits the loop immediately"
    difficulty: 2
    as_name: riddleM26
    options:
      - "Skips one item"
      - "Repeats the loop"
      - "Exits the loop immediately"
    hints: [ "Compare with continue", "See Module 4" ]

  - !PyRiddle &riddleM27
    title: "M27: Reversing Slices 🔁"
    question: |
      What does "hello"[::-1] return?
    correct_answer: "olleh"
    difficulty: 2
    as_name: riddleM27
    options:
      - "hello"
      - "olleh"
      - "error"
    hints: [ "Step -1 reverses a string", "Module 5 slicing" ]

  - !PyRiddle &riddleM28
    title: "M28: Trace the Print 🔍"
    question: |
      What prints?

      for i in range(2):
          print("loop", i)

    correct_answer: "loop 0\\nloop 1"
    difficulty: 1
    as_name: riddleM28
    options:
      - "loop 1\\nloop 2"
      - "loop 0\\nloop 1"
      - "loop i"
    hints: [ "range(2) gives 0 and 1", "i is the index" ]

  - !PyRiddle &riddleM29
    title: "M29: String Method 🔠"
    question: |
      What does "abc".upper() return?
    correct_answer: "ABC"
    difficulty: 1
    as_name: riddleM29
    options:
      - "abc"
      - "ABC"
      - "Abc"
    hints: [ "Uppercase version", "Method from Module 6" ]

  - !PyRiddle &riddleM30
    title: "M30: File Close 🔚"
    question: |
      What does `with open(...)` automatically do?
    correct_answer: "Closes the file when the block ends"
    difficulty: 2
    as_name: riddleM30
    options:
      - "Keeps file open forever"
      - "Closes the file when the block ends"
      - "Deletes the file"
    hints: [ "Automatic close with context manager", "Introduced in file I/O module" ]

  - !PyRiddle &riddleM31
    title: "M31: Function Return 🎯"
    question: |
      What is the purpose of return?
    correct_answer: "Send a value back to the caller"
    difficulty: 1
    as_name: riddleM31
    options:
      - "Show a printout"
      - "Send a value back to the caller"
      - "Exit the script"
    hints: [ "Different from print()", "Defined in Module 3" ]

  - !PyRiddle &riddleM32
    title: "M32: String Check ✅"
    question: |
      What does "x" in "text" return?
    correct_answer: "True"
    difficulty: 1
    as_name: riddleM32
    options:
      - "False"
      - "True"
      - "Error"
    hints: [ "Membership test in Module 5", "x is inside 'text'" ]

  - !PyRiddle &riddleM33
    title: "M33: Using range() 📏"
    question: |
      What does list(range(3)) return?
    correct_answer: "[0, 1, 2]"
    difficulty: 2
    as_name: riddleM33
    options:
      - "[1, 2, 3]"
      - "[0, 1, 2]"
      - "[0, 1, 2, 3]"
    hints: [ "Start at 0, stop before 3", "Module 3 loops" ]

  - !PyRiddle &riddleM34
    title: "M34: Testing with >>>"
    question: |
      What does >>> mean in a docstring?
    correct_answer: "Example of code to be tested"
    difficulty: 2
    as_name: riddleM34
    options:
      - "It runs a program"
      - "It defines a string"
      - "Example of code to be tested"
    hints: [ "See doctest examples", "Module 9" ]

  - !PyRiddle &riddleM35
    title: "M35: File Modes ⚙️"
    question: |
      What does mode "a" mean in open()?
    correct_answer: "Append to the file"
    difficulty: 1
    as_name: riddleM35
    options:
      - "Analyze file"
      - "Append to the file"
      - "Ask user for permission"
    hints: [ "Write adds new content to the end", "See Module 6" ]

  - !PyRiddle &riddleM36
    title: "M36: .count() Method 🔢"
    question: |
      What does "banana".count("a") return?
    correct_answer: "3"
    difficulty: 2
    as_name: riddleM36
    options:
      - "2"
      - "3"
      - "1"
    hints: [ "Count specific character", "Module 6 methods" ]

  - !PyRiddle &riddleM37
    title: "M37: chr and ord 🔄"
    question: |
      What does chr(ord("a") + 1) return?

    correct_answer: "b"
    difficulty: 2
    as_name: riddleM37
    options:
      - "a"
      - "b"
      - "1"
    hints: [ "Unicode shift", "Encryption base in Module 6" ]

  - !PyRiddle &riddleM38
    title: "M38: Error Reading 🐛"
    question: |
      What does this error mean?

      ValueError: invalid literal for int()
    correct_answer: "Tried to convert a non-number string to int"
    difficulty: 2
    as_name: riddleM38
    options:
      - "File not found"
      - "Tried to convert a non-number string to int"
      - "Too many arguments"
    hints: [ "See exception diagnostics", "Introduced in Module 2" ]

  - !PyRiddle &riddleM39
    title: "M39: Custom Input 🧃"
    question: |
      What’s the purpose of this input?

      drink = input("Your drink: ")

    correct_answer: "Reads text from the user"
    difficulty: 1
    as_name: riddleM39
    options:
      - "Declares a variable"
      - "Reads text from the user"
      - "Prints a drink"
    hints: [ "input() waits for typing", "See Module 1–2" ]

  - !PyRiddle &riddleM40
    title: "M40: Final Check 🔁"
    question: |
      What does this do?

      print(greet("Ari"))
      
      def greet(name): return "Hi " + name
    correct_answer: "Prints 'Hi Ari'"

    difficulty: 2
    as_name: riddleM40
    options:
      - "Returns nothing"
      - "Prints 'Hi Ari'"
      - "Error: wrong order"
    hints: [ "Python reads from top to bottom unless defined earlier", "See function usage" ]

  - !Table &python_quiz_table
    title: Python Quiz Table
    source: [*quiz01, *quiz02, *quiz03, *quiz04, *quiz05, *quiz06, *quiz07, *quiz08, *quiz09, *riddleM10,
             *riddleM11, *riddleM12, *riddleM13, *riddleM14, *riddleM15, *riddleM16, *riddleM17, *riddleM18,
             *riddleM19, *riddleM20, *riddleM21, *riddleM22, *riddleM23, *riddleM24, *riddleM25, *riddleM26,
             *riddleM27, *riddleM28, *riddleM29, *riddleM30, *riddleM31, *riddleM32, *riddleM33, *riddleM34,
             *riddleM35, *riddleM36, *riddleM37, *riddleM38, *riddleM39, *riddleM40]


  - !Inspector
    title: Quiz Inspector
    subjects: [*python_quiz_table]
    attributes: [question, hints, answer]
    methods: [check_answer]
    border: True
    on_init:
      - !Function
        code: |
          self._hidden = (len(self.subjects[0].source) == 0) or (self.subjects[0].selection is None)
          if not self._hidden:
            self.source = self.subjects[0].selection