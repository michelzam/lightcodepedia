name: UX Tests

on:
  # Run automatically after Pages deployment completes
  workflow_run:
    workflows: ["Deploy Jekyll to GitHub Pages"]
    types: [completed]
  # Run manually from the Actions tab → "Run workflow" (no terminal needed)
  workflow_dispatch:
    inputs:
      only:
        description: "Run ONE feature only (e.g. runner, avatar, classroom) — empty = full suite. Scoped runs burn far fewer private-repo minutes and don't overwrite the published results."
        required: false
        default: ""
      scenarios:
        description: "Run only scenarios whose name matches this regex (behave -n), e.g. the failing ones. Empty = no name filter. Scoped, so it doesn't overwrite the published results."
        required: false
        default: ""
      base_url:
        description: "Base URL to test against (empty = this repo's own live site)"
        required: false
        default: ""

jobs:
  ux-tests:
    runs-on: ubuntu-latest
    # contents: push the results back to main
    # actions: dispatch the Pages workflow so the report gets deployed
    permissions:
      contents: write
      actions: write
    # Only run if triggered manually, or if the pages deployment succeeded
    # AND was not triggered by the bot's own results commit (loop guard).
    # Auto-runs only in the public repo (free minutes); in the lab the suite
    # is manual-dispatch only, so private Actions minutes are never burned
    # by a push. The bot-author clause is the results-commit loop guard.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.repository == 'michelzam/lightcodepedia' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_commit.author.email != '41898282+github-actions[bot]@users.noreply.github.com')

    env:
      # Empty input → the repo's own site: unlisted lab Pages in the lab,
      # the canonical domain in the public repo.
      BASE_URL: ${{ github.event.inputs.base_url || (github.repository == 'michelzam/lightcodelab' && 'https://michelzam.github.io/lightcodelab' || 'https://lightcodepedia.org') }}
      # One feature name to scope the run; empty = whole suite. Used to build the
      # behave target and to gate publishing (a scoped run is a quick check, not
      # the canonical result set — it must not overwrite the full ux-results).
      ONLY: ${{ github.event.inputs.only }}
      # Optional behave -n name regex (e.g. run only the scenarios that failed).
      SCENARIOS: ${{ github.event.inputs.scenarios }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      # Cache the browser build so repeat runs skip the download (saves minutes).
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/requirements.txt') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run BDD UX tests
        id: behave
        continue-on-error: true
        run: |
          TARGET="tests/features/"
          if [ -n "$ONLY" ]; then TARGET="tests/features/${ONLY}.feature"; fi
          NAME=(); [ -n "$SCENARIOS" ] && NAME=(-n "$SCENARIOS")
          echo "::notice::Running $TARGET ${NAME[*]} against $BASE_URL"
          behave "$TARGET" "${NAME[@]}" --no-capture \
            -f json -o ux-report.json \
            -f behave_html_formatter:HTMLFormatter -o docs/assets/ux-report.html \
            -f progress2

      # Retry only helps the AUTO path (a red is usually a deploy race, tests
      # newer than the served Pages build). A manual run is intentional and the
      # owner can re-dispatch, so we skip the retry there — it would double the
      # private-repo minutes for no benefit.
      - name: Retry once after the dust settles
        id: behave2
        if: steps.behave.outcome == 'failure' && github.event_name != 'workflow_dispatch'
        continue-on-error: true
        run: |
          sleep 120
          TARGET="tests/features/"
          if [ -n "$ONLY" ]; then TARGET="tests/features/${ONLY}.feature"; fi
          NAME=(); [ -n "$SCENARIOS" ] && NAME=(-n "$SCENARIOS")
          behave "$TARGET" "${NAME[@]}" --no-capture \
            -f json -o ux-report.json \
            -f behave_html_formatter:HTMLFormatter -o docs/assets/ux-report.html \
            -f progress2

      # A scoped run only exercised one feature — publishing its report would
      # wipe the other 130+ scenarios from ux-results.json. Only the full suite
      # updates the canonical results shown on /nodes.
      - name: Build per-scenario results JSON
        if: always() && env.ONLY == '' && env.SCENARIOS == ''
        run: python tests/report_to_results.py ux-report.json docs/assets/ux-results.json

      - name: Publish results to main
        if: always() && env.ONLY == '' && env.SCENARIOS == ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/ux-results.json docs/assets/ux-report.html docs/assets/ux-summary.json docs/assets/metrics.json docs/assets/metrics_trend.json
          if git diff --cached --quiet; then
            echo "No change in results."
          else
            git commit -m "chore: update UX test results"
            # The loop guard above stops ux-tests re-running on this bot commit.
            # Use merge -X ours so concurrent runs never hit a rebase conflict.
            git fetch origin main
            git merge origin/main -X ours --no-edit
            git push origin HEAD:main
            # GITHUB_TOKEN pushes don't trigger workflows implicitly, so
            # dispatch the Pages build explicitly to deploy the new report.
            # The bot-author loop guard stops ux-tests re-running after it.
            gh workflow run pages.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifacts on failure
        if: steps.behave.outcome == 'failure' && steps.behave2.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: behave-results
          path: |
            ux-report.json
            docs/assets/ux-report.html
            *.png

      - name: Fail job if any scenario failed
        if: steps.behave.outcome == 'failure' && steps.behave2.outcome != 'success'
        run: exit 1
