name: UX Tests

on:
  # Run automatically after Pages deployment completes
  workflow_run:
    workflows: ["Deploy Jekyll to GitHub Pages"]
    types: [completed]
  # Run manually against any URL (default: live site)
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against (empty = this repo's own live site)"
        required: false
        default: ""

jobs:
  ux-tests:
    runs-on: ubuntu-latest
    # contents: push the results back to main
    # actions: dispatch the Pages workflow so the report gets deployed
    permissions:
      contents: write
      actions: write
    # Only run if triggered manually, or if the pages deployment succeeded
    # AND was not triggered by the bot's own results commit (loop guard).
    # Auto-runs only in the public repo (free minutes); in the lab the suite
    # is manual-dispatch only, so private Actions minutes are never burned
    # by a push. The bot-author clause is the results-commit loop guard.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.repository == 'michelzam/lightcodepedia' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_commit.author.email != '41898282+github-actions[bot]@users.noreply.github.com')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run BDD UX tests
        id: behave
        continue-on-error: true
        env:
          # Empty input → the repo's own site: unlisted lab Pages in the lab,
          # the canonical domain in the public repo.
          BASE_URL: ${{ github.event.inputs.base_url || (github.repository == 'michelzam/lightcodelab' && 'https://michelzam.github.io/lightcodelab' || 'https://lightcodepedia.org') }}
        run: >
          behave tests/features/ --no-capture
          -f json -o ux-report.json
          -f behave_html_formatter:HTMLFormatter -o docs/assets/ux-report.html
          -f progress2

      - name: Retry once after the dust settles
        id: behave2
        if: steps.behave.outcome == 'failure'
        continue-on-error: true
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://lightcodepedia.org' }}
        run: |
          # transient reds are usually a deploy race (tests newer than the
          # served Pages build) — give the queue time, then try once more
          sleep 120
          behave tests/features/ --no-capture             -f json -o ux-report.json             -f behave_html_formatter:HTMLFormatter -o docs/assets/ux-report.html             -f progress2

      - name: Build per-scenario results JSON
        if: always()
        run: python tests/report_to_results.py ux-report.json docs/assets/ux-results.json

      - name: Publish results to main
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/ux-results.json docs/assets/ux-report.html docs/assets/ux-summary.json docs/assets/metrics.json docs/assets/metrics_trend.json
          if git diff --cached --quiet; then
            echo "No change in results."
          else
            git commit -m "chore: update UX test results"
            # The loop guard above stops ux-tests re-running on this bot commit.
            # Use merge -X ours so concurrent runs never hit a rebase conflict.
            git fetch origin main
            git merge origin/main -X ours --no-edit
            git push origin HEAD:main
            # GITHUB_TOKEN pushes don't trigger workflows implicitly, so
            # dispatch the Pages build explicitly to deploy the new report.
            # The bot-author loop guard stops ux-tests re-running after it.
            gh workflow run pages.yml --ref main
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifacts on failure
        if: steps.behave.outcome == 'failure' && steps.behave2.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: behave-results
          path: |
            ux-report.json
            docs/assets/ux-report.html
            *.png

      - name: Fail job if any scenario failed
        if: steps.behave.outcome == 'failure' && steps.behave2.outcome != 'success'
        run: exit 1
