name: UX Tests

on:
  # Run automatically after Pages deployment completes
  workflow_run:
    workflows: ["pages"]
    types: [completed]
  # Run manually against any URL (default: live site)
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against"
        required: false
        default: "https://lightcodepedia.org"

jobs:
  ux-tests:
    runs-on: ubuntu-latest
    # Push the per-scenario results JSON back to main
    permissions:
      contents: write
    # Only run if triggered manually, or if the pages deployment succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run BDD UX tests
        id: behave
        continue-on-error: true
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://lightcodepedia.org' }}
        run: >
          behave tests/features/ --no-capture
          -f json -o ux-report.json
          -f behave_html_formatter:HTMLFormatter -o docs/assets/ux-report.html
          -f progress2

      - name: Build per-scenario results JSON
        if: always()
        run: python tests/report_to_results.py ux-report.json docs/assets/ux-results.json

      - name: Publish results to main
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/ux-results.json docs/assets/ux-report.html
          if git diff --cached --quiet; then
            echo "No change in results."
          else
            git commit -m "chore: update UX test results [skip ci]"
            # GITHUB_TOKEN pushes do not re-trigger workflows, so this cannot loop
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Upload artifacts on failure
        if: steps.behave.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: behave-results
          path: |
            ux-report.json
            docs/assets/ux-report.html
            *.png

      - name: Fail job if any scenario failed
        if: steps.behave.outcome == 'failure'
        run: exit 1
